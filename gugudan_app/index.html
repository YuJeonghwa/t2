<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>유치찬란 구구단 게임!</title>
    <meta name="description" content="초등학생을 위한 신나고 즐거운 구구단 연습 게임">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 class="bounce-title">🌈유치찬란<br>구구단 대모험🚀</h1>
            <button id="start-btn" class="jelly-btn">게임 시작하기!</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="header">
                <div class="score-board">점수: <span id="score">0</span> 🌟</div>
                <div class="lives">생명: <span id="lives">❤️❤️❤️</span></div>
            </div>
            
            <div class="question-container">
                <h2 id="question">2 X 3 = ?</h2>
            </div>

            <div class="answers-grid">
                <button class="answer-btn jelly-btn" aria-label="정답 1"></button>
                <button class="answer-btn jelly-btn" aria-label="정답 2"></button>
                <button class="answer-btn jelly-btn" aria-label="정답 3"></button>
                <button class="answer-btn jelly-btn" aria-label="정답 4"></button>
            </div>
            
            <div id="feedback" class="feedback-fx"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="screen">
            <h1 class="bounce-title">게임 오버! 😭</h1>
            <p class="final-score-text">최종 점수: <span id="final-score">0</span> 🌟</p>
            <p id="evaluation"></p>
            <button id="retry-btn" class="jelly-btn">다시 하기!</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
